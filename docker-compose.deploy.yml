# ============================================================
# AuditYote — deploy override: run behind a reverse proxy that terminates TLS.
#
#   docker compose -f docker-compose.yml -f docker-compose.deploy.yml --profile app up -d
#
# The SPA is published only on the loopback interface for the reverse proxy to reach. PostgreSQL and
# the backend stay on the internal compose network, so nothing but the loopback SPA port is published.
# (docker-compose.prod.yml is an alternative that runs Caddy as a standalone proxy with automatic TLS.)
#
# `ports: !reset []` clears the host-published ports inherited from docker-compose.yml; a plain `[]`
# would MERGE and leave them exposed. See docker-compose.prod.yml for the same fix.
# ============================================================

services:
  db:
    ports: !reset []                       # internal only — Postgres is never reachable off-host

  backend:
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # TLS is terminated by the reverse proxy; issue the session cookie as Secure (HTTPS-only).
      SESSION_COOKIE_SECURE: "true"
    ports: !reset []                       # internal only — the SPA proxies /api over the compose network

  frontend:
    # Publish ONLY on loopback. The reverse proxy forwards HTTPS traffic to this port.
    # !override replaces the base's published port outright (!reset would just CLEAR it, leaving nothing).
    ports: !override ["127.0.0.1:8090:8080"]
