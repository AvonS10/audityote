# AuditYote — reverse-proxy vhost. A plain HTTP server block that proxies to the Dockerized SPA on the
# loopback interface. This is the HTTP-only bootstrap; running certbot against the domain rewrites it
# in place to add the `listen 443 ssl` block, the certificate lines, and the HTTP->HTTPS redirect.

server {
    server_name audityote.pasin.dev;

    # Headroom for finding descriptions / CSV-PDF report downloads (and future evidence uploads).
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        # Explicit upstream Host (this vhost only ever serves AuditYote) — don't forward the
        # attacker-controllable client Host header.
        proxy_set_header Host              audityote.pasin.dev;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 80;
    listen [::]:80;
}
