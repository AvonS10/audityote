# AuditYote — host nginx vhost for audityote.pasin.dev.
# Mirrors the existing todo-app vhost: a plain HTTP server block that reverse-proxies to the
# Dockerized SPA on 127.0.0.1:8090. This is the HTTP-only bootstrap — running
#   sudo certbot --nginx -d audityote.pasin.dev
# rewrites this in place to add the managed `listen 443 ssl` block, the certificate lines, and the
# HTTP->HTTPS redirect (exactly as it did for pasin.dev).
#
# Install:
#   sudo cp deploy/nginx/audityote.conf /etc/nginx/sites-available/audityote
#   sudo ln -s /etc/nginx/sites-available/audityote /etc/nginx/sites-enabled/audityote
#   sudo nginx -t && sudo systemctl reload nginx

server {
    server_name audityote.pasin.dev;

    # Headroom for finding descriptions / CSV-PDF report downloads (and future evidence uploads).
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        # Explicit upstream Host (this vhost only ever serves AuditYote) — don't forward the
        # attacker-controllable client Host header.
        proxy_set_header Host              audityote.pasin.dev;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 80;
    listen [::]:80;
}
