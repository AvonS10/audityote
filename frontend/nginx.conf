# AuditYote SPA — serves the static bundle and proxies /api to the backend so the browser stays
# same-origin (session cookies + CSRF work with no CORS). In production the host nginx fronts this and
# terminates TLS; this container listens on 8080 as the non-root nginx user.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't cache the entry document — it references hashed asset filenames that DO get cached.
    # (`expires` rather than `add_header` so a location-level header doesn't shadow server headers.)
    location = /index.html {
        expires -1;
    }

    # Hashed, immutable build assets — safe to cache long-term.
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # API → Spring Boot backend (Docker-network service name). nginx defaults the upstream Host header
    # to the proxied host ($proxy_host), so we don't forward the attacker-controllable client Host.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA client-side routing — every other path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
