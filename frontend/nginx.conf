# ControlMap SPA — serves the static bundle and proxies /api to the backend so the browser stays
# same-origin (session cookies + CSRF work with no CORS). In production Caddy fronts this and routes
# /api directly to the backend; this /api block then simply never gets hit.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't cache the entry document — it references hashed asset filenames that DO get cached.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Hashed, immutable build assets.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # API → Spring Boot backend (Docker-network service name).
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA client-side routing — every other path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
