# AuditYote SPA — serves the static bundle and proxies /api to the backend so the browser stays
# same-origin (session cookies + CSRF work with no CORS). In production the host nginx fronts this and
# terminates TLS; this container listens on 8080 as the non-root nginx user.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers, set once at the server level so EVERY location inherits them (`always` keeps
    # them on error responses too). They must live only here, not in any location: nginx's inheritance
    # rule drops the whole inherited set the moment a location declares its own add_header, and Semgrep's
    # nginx.security.header-redefinition rule (correctly) flags that. So the SPA locations use `expires`
    # (not add_header) for caching, and /api only sets request headers — both keep inheritance intact.
    # On /api this overlaps Spring Security's own X-Frame-Options / X-Content-Type-Options (identical
    # values), which is harmless defense-in-depth; HSTS + CSP etc. are the API's net-new coverage.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP: self-hosted bundle + Google Fonts (the design system @imports fonts.googleapis.com, whose
    # font files come from fonts.gstatic.com). 'unsafe-inline' in style-src covers the design system's
    # inline `style=` attributes; frame-ancestors 'none' mirrors X-Frame-Options for modern browsers.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Don't cache the entry document — it references hashed asset filenames that DO get cached.
    # (`expires` rather than `add_header` so a location-level header doesn't shadow server headers.)
    location = /index.html {
        expires -1;
    }

    # Hashed, immutable build assets — safe to cache long-term.
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # API → Spring Boot backend (Docker-network service name). nginx defaults the upstream Host header
    # to the proxied host ($proxy_host), so we don't forward the attacker-controllable client Host.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA client-side routing — every other path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
