# ControlMap backend configuration.
# Secrets/credentials come from the environment (see .env / .env.example) — never hardcoded here.
# Defaults below let the app start from IntelliJ against the dockerized Postgres (`docker compose up -d db`).
spring:
  application:
    name: controlmap-backend

  # Active profile: dev (local/compose) or prod (HTTPS-only, strict). Defaults to dev.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/controlmap}
    username: ${SPRING_DATASOURCE_USERNAME:controlmap}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    # Flyway owns the schema; Hibernate must never mutate it — only validate against migrations.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # Schema migrations live in src/main/resources/db/migration (V1 baseline; entities land in chunk #5).
  flyway:
    enabled: true
    locations: classpath:db/migration

# Application policy knobs (not secrets).
controlmap:
  posture:
    # Risk-posture gauge normalization cap (§9/§16 #5): the weighted active-risk load that reads as
    # "Severe" (score 100). Higher = the gauge stays calmer; lower = it reacts to fewer findings.
    cap: ${CONTROLMAP_POSTURE_CAP:100}

# Demo-user seeding (DataSeeder). Real values come from the gitignored .env; blank = not seeded.
seed:
  analyst:
    name: ${SEED_ANALYST_NAME:Demo Analyst}
    email: ${SEED_ANALYST_EMAIL:}
    password: ${SEED_ANALYST_PASSWORD:}
  reviewer:
    name: ${SEED_REVIEWER_NAME:Demo Reviewer}
    email: ${SEED_REVIEWER_EMAIL:}
    password: ${SEED_REVIEWER_PASSWORD:}

server:
  port: 8080
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax
        # Secure is off for local http; the prod profile / reverse proxy sets SESSION_COOKIE_SECURE=true.
        secure: ${SESSION_COOKIE_SECURE:false}

# Keep error responses lean — no stack traces or internals leaked to clients (PLAN §10 error model).
  error:
    include-stacktrace: never
    include-message: never
