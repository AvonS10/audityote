# ============================================================
# ControlMap — CI / DevSecOps pipeline.
#
# Designed to be GREEN from day one and light up progressively:
#  - a `detect` job checks which parts of the monorepo exist; the backend /
#    frontend jobs only run once backend/pom.xml or frontend/package.json exist.
#    (hashFiles() is NOT allowed in a job-level `if`, so the existence check
#    lives in `detect` and the other jobs gate on its outputs.)
#  - Semgrep (SAST) and Trivy (deps + secrets) run on every push/PR and are
#    BLOCKING — they fail the build on findings. Tune severity/rulesets below.
# ============================================================
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect which parts of the monorepo are present yet, so the language jobs
  # activate only when there is something to build (keeps CI green pre-code).
  detect:
    name: Detect components
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.check.outputs.backend }}
      frontend: ${{ steps.check.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          echo "backend=$([ -f backend/pom.xml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "frontend=$([ -f frontend/package.json ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  backend:
    name: Backend — Maven build & tests
    needs: detect
    if: ${{ needs.detect.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build & test
        working-directory: backend
        # AI-suggestion tests are mocked — CI needs no API key and makes no live calls.
        run: mvn -B verify

  frontend:
    name: Frontend — lint, build, test
    needs: detect
    if: ${{ needs.detect.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Test
        working-directory: frontend
        run: npm test --if-present

  semgrep:
    name: Semgrep — SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      # --error makes findings fail the build (blocking). Adjust the rulesets as needed.
      - run: semgrep scan --config p/default --config p/owasp-top-ten --config p/secrets --error

  trivy:
    name: Trivy — dependencies & secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Filesystem scan: dependency CVEs, leaked secrets, IaC misconfig.
      # Pin/bump this action tag as you like.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      # Later (once images exist), add a container-image scan of the built backend/frontend.
