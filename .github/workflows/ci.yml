# ============================================================
# ControlMap — CI / DevSecOps pipeline.
#
# Designed to be GREEN from day one and light up progressively:
#  - a `detect` job checks which parts of the monorepo exist; the backend /
#    frontend jobs only run once backend/pom.xml or frontend/package.json exist.
#    (hashFiles() is NOT allowed in a job-level `if`, so the existence check
#    lives in `detect` and the other jobs gate on its outputs.)
#  - Semgrep (SAST) and Trivy (deps + secrets) run on every push/PR and are
#    BLOCKING — they fail the build on findings. Tune severity/rulesets below.
# ============================================================
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect which parts of the monorepo are present yet, so the language jobs
  # activate only when there is something to build (keeps CI green pre-code).
  detect:
    name: Detect components
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.check.outputs.backend }}
      frontend: ${{ steps.check.outputs.frontend }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: check
        run: |
          echo "backend=$([ -f backend/pom.xml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "frontend=$([ -f frontend/package.json ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  backend:
    name: Backend — Maven build & tests
    needs: detect
    if: ${{ needs.detect.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    # Repository slice tests (@DataJpaTest) run against a real Postgres + Flyway. Reachable on
    # localhost for this non-container job. Credentials are throwaway CI values, not secrets.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: controlmap
          POSTGRES_USER: controlmap
          POSTGRES_PASSWORD: controlmap
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U controlmap -d controlmap"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build & test
        working-directory: backend
        # AI-suggestion tests are mocked — CI needs no API key and makes no live calls.
        # Seed creds are throwaway CI values so the seeder creates demo users + sample findings
        # the integration tests assert against.
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/controlmap
          SPRING_DATASOURCE_USERNAME: controlmap
          SPRING_DATASOURCE_PASSWORD: controlmap
          SEED_ANALYST_EMAIL: analyst@controlmap.local
          SEED_ANALYST_PASSWORD: ci-analyst-pw
          SEED_REVIEWER_EMAIL: reviewer@controlmap.local
          SEED_REVIEWER_PASSWORD: ci-reviewer-pw
        run: mvn -B verify

  frontend:
    name: Frontend — lint, build, test
    needs: detect
    if: ${{ needs.detect.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    # Playwright is a dev-only tool for local screenshots; CI never runs it, so skip its
    # ~100MB browser download during npm ci.
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Test
        working-directory: frontend
        run: npm test --if-present

  semgrep:
    name: Semgrep — SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # --error makes findings fail the build (blocking). Adjust the rulesets as needed.
      - run: semgrep scan --config p/default --config p/owasp-top-ten --config p/secrets --error

  trivy:
    name: Trivy — dependencies & secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Filesystem scan: dependency CVEs, leaked secrets, IaC misconfig.
      # Pin/bump this action tag as you like.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      # Later (once images exist), add a container-image scan of the built backend/frontend.
